# Blueprint Render — conectar repo GitHub y desplegar en un clic
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: agente-de-ia-juridico
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SITE_USERNAME
        value: despacho
      - key: SITE_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_IDLE_MINUTES
        value: "30"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: DATABASE_URL
        fromDatabase:
          name: agente-db
          property: connectionString
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SLACK_REVIEW_CHANNEL
        value: "#revision-abogado"

databases:
  - name: agente-db
    plan: free
    databaseName: agente
    user: agente
