<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión — Asistente Jurídico</title>
    <link rel="icon" href="/static/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/chat.css" />
  </head>
  <body class="auth-gate">
    <div class="auth-gate-wrap">
      <p id="auth-error" class="auth-error-banner" hidden role="alert" aria-live="assertive"></p>
      <main class="auth-gate-card">
      <img class="auth-gate-logo" src="/static/dbx-logo.png" alt="DBX Solutions" width="200" height="40" />
      <h1 class="auth-gate-title">Mesa de trabajo del despacho</h1>
      <p class="auth-gate-subtitle">Asistente jurídico con supervisión humana · acceso restringido.</p>

      <!-- Native POST: Chrome detecta login en /login y guarda en el llavero -->
      <form id="login-form" name="login" method="post" action="/auth/login" autocomplete="on">
        <label class="auth-label" for="auth-username">Usuario</label>
        <input
          class="auth-input"
          type="text"
          id="auth-username"
          name="username"
          autocomplete="username"
          autocapitalize="none"
          spellcheck="false"
          required
        />

        <label class="auth-label" for="auth-password">Contraseña</label>
        <input
          class="auth-input"
          type="password"
          id="auth-password"
          name="password"
          autocomplete="current-password"
          required
        />

        <button type="submit" class="btn-auth-submit">Entrar</button>
      </form>
    </main>
    </div>

    <script src="/static/login.js"></script>
  </body>
</html>
