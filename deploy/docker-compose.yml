services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=agente
      - POSTGRES_PASSWORD=agente
      - POSTGRES_DB=agente
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agente -d agente"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Paridad dev==prod: la app habla con el Postgres del compose.
      - DATABASE_URL=postgresql+psycopg://agente:agente@db:5432/agente
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
