name: Backup Postgres → R2

on:
  schedule:
    # 02:00 Colombia (UTC-5) ≈ 07:00 UTC
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client gnupg awscli

      - name: Install Python deps (export audit)
        run: pip install -e .

      - name: Run backup to R2
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          LABEL: prod
        run: |
          chmod +x scripts/dr/backup_to_r2.sh
          ./scripts/dr/backup_to_r2.sh
