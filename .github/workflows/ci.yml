name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate Fase 0 structure
        run: python scripts/validate_fase0.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify Docker build (paridad prod)
        run: docker build -f deploy/Dockerfile -t agente-juridico-ci .

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit || true
