name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_smoke_local:
        description: "Ejecutar validación extensa local (capas 1-5)"
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate Fase 0 structure
        run: python scripts/validate_fase0.py

      - name: Build audit portal (paridad prod)
        run: AUDIT_API_BASE="" python scripts/generar_audit_portal.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Verify Docker build (paridad prod)
        run: docker build -f deploy/Dockerfile -t agente-juridico-ci .

      - name: Dependency audit
        run: |
          pip install pip-audit
          pip-audit

  smoke-local:
    if: github.event_name == 'workflow_dispatch' && inputs.run_smoke_local
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validación extensa local (sin Postgres)
        env:
          DATABASE_URL: ""
          SITE_PASSWORD: test-secret-pass
          SITE_USERNAME: despacho
          SESSION_SECRET: ci-smoke-session-secret-key-32chars
        run: ./scripts/validacion_sistema_completa.sh
