name: Deploy Legal Audit Portal

on:
  push:
    branches:
      - main
    paths:
      - 'audit-portal/site/**'
      - 'scripts/generar_audit_portal.py'
      - 'scripts/lib/catalogo_aprobacion.py'
      - 'scripts/lib/audit_data.py'
      - 'scripts/lib/catalogo_aprobacion.py'
      - 'agente/skills/**'
      - '.cursor/skills/**'
      - 'docs/canon/lista-aprobacion-agentes-skills-pasos.md'
      - '.github/workflows/deploy-audit-portal.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build audit portal
        env:
          AUDIT_API_BASE: https://agente-de-ia-juridico.onrender.com
          AUDIT_PORTAL_AUTH_ENABLED: ${{ vars.AUDIT_PORTAL_AUTH_ENABLED }}
          AUDIT_PORTAL_PASSWORD: ${{ secrets.AUDIT_PORTAL_PASSWORD }}
          AUDIT_PORTAL_USERNAME: ${{ secrets.AUDIT_PORTAL_USERNAME }}
        run: python scripts/generar_audit_portal.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: audit-portal/dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: audit portal ${{ github.sha }}'
